# Dependabot configuration file to keep GitHub Actions and Gradle dependencies up to date.

version: 2
updates:

  # Maintain GitHub Actions by checking for updates to workflow steps
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Daily checks ensure security patches for actions are applied quickly
      interval: "daily"
    labels:
      - "ci-cd"
      - "automated-update"

  # Maintain Android/Gradle dependencies
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      # Weekly interval to balance between staying current and reducing PR noise
      interval: "monthly"
    open-pull-requests-limit: 5
    # Group related updates to minimize the number of open pull requests
    groups:
      android-internal:
        patterns:
          - "androidx.*"
          - "com.android.*"
          - "org.jetbrains.kotlin.*"
      jackson-stack:
        patterns:
          - "com.fasterxml.jackson.*"
    labels:
      - "dependencies"
      - "gradle-update"
