# ====================================================================
# GitHub Actions Workflow: Manual Build & Release Dispatcher
# Purpose: Generates a build via a manual input form. Allows choosing
#          between Pre-release/Final and adding a custom version note.
# ====================================================================

name: Build & Release

on:
  workflow_dispatch:
    inputs:
      # Allows the user to toggle between 'prerelease' and 'release' status
      release_type:
        description: 'Select the release type'
        required: true
        default: 'prerelease'
        type: choice
        options:
          - prerelease
          - release
      # Optional field for changelog summaries or build context
      version_note:
        description: 'Note for the release'
        required: false
        default: 'Manual Build'

jobs:
  build_and_publish:
    name: Build, Tag, and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for creating the Release and pushing the Tag

    steps:
      # Step 1: Initialize environment and fetch source
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for accurate tag comparison
          fetch-tags: true

      # Step 2: Configure Java environment with integrated caching
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # Step 3: Provision Android SDK build tools
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      # Step 4: Prepare the wrapper for execution
      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # Step 5: Extract the exact version string first via your Gradle task
      - name: Get Version from Gradle Task
        id: gradle_version
        run: |
          VERSION=$(./gradlew -q :app:printAppVersion)
          printf "version=%s\n" "$VERSION" >> "$GITHUB_OUTPUT"
          printf "display_date=%s\n" "$(date +'%Y-%m-%d %H:%M')" >> "$GITHUB_OUTPUT"

      # Step 6: Get the latest existing tag from git history depending on release type
      - name: Get Last Git Tag
        id: get_last_tag
        run: |
          if [ "${{ github.event.inputs.release_type }}" = "prerelease" ]; then
            # For a prerelease, look back to ANY last tag (including previous prereleases)
            LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          else
            # For a final release, match all 'v*' tags but explicitly EXCLUDE those with a hyphen (your prereleases)
            # This cleanly skips 'v0.3.0-2026...' and stops exactly at the last stable 'v0.2.5'
            LAST_TAG=$(git describe --tags --abbrev=0 --match="v*" --exclude="*-*" HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          fi
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"

      # Step 7: Automatically build the changelog from commits since the last tag
      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: "COMMIT"
          fromTag: ${{ steps.get_last_tag.outputs.last_tag }}
          toTag: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 8: Execute Parallel Compilation
      # Passes the extracted version string back into Gradle to freeze it
      - name: Build APKs
        run: |
          ./gradlew clean assembleDebug assembleRelease \
            -PappStatus=${{ github.event.inputs.release_type }} \
            -PprojectVersion="${{ steps.gradle_version.outputs.version }}"

      # Step 9: Create GitHub Release and Upload Artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.gradle_version.outputs.version }}"
          name: "${{ github.event.inputs.release_type == 'release' && 'Final Release' || 'Pre-Release' }} v${{ steps.gradle_version.outputs.version }}"
          body: |
            ### Build Information
            - **App Version:** `${{ steps.gradle_version.outputs.version }}`
            - **Type:** ${{ github.event.inputs.release_type }}
            - **Note:** ${{ github.event.inputs.version_note }}
            - **Build Date:** ${{ steps.gradle_version.outputs.display_date }}

            ### Changelog
            ${{ steps.build_changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ github.event.inputs.release_type == 'prerelease' }}
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
