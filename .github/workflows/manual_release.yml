name: Build & Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Select the release type'
        required: true
        default: 'prerelease'
        type: choice
        options:
          - prerelease
          - release
      version_note:
        description: 'Note for the release'
        required: false
        default: 'Manual Build'

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build APKs
        # Executes the build and passes the release_type (release/prerelease) to Gradle
        # to ensure the resulting APK filenames reflect the selected status.
        run: ./gradlew clean assembleDebug assembleRelease -PappStatus=${{ github.event.inputs.release_type }}

      - name: Generate Tag Name
        id: tag
        run: |
          echo "tag_name=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT
          echo "display_date=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: "${{ github.event.inputs.release_type == 'release' && 'Final Release' || 'Pre-Release' }} ${{ steps.tag.outputs.display_date }}"
          body: |
            ### Build Information
            - **Type:** ${{ github.event.inputs.release_type }}
            - **Note:** ${{ github.event.inputs.version_note }}
            - **Build Date:** ${{ steps.tag.outputs.display_date }}
          draft: false
          # Logic: if input is 'prerelease', set true, else false
          prerelease: ${{ github.event.inputs.release_type == 'prerelease' }}
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
