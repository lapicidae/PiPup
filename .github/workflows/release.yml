# ====================================================================
# GitHub Actions Workflow: Release Production APK
# Purpose: Compiles a production-ready release APK and attaches it
#          directly to a GitHub Release.
# ====================================================================

name: Release

on:
  # Manual trigger for controlled releases
  workflow_dispatch:
  # Note: Release-based triggers are currently commented out
  # to prevent accidental automated deployments.
#  release:
#    types:
#      - "published"

jobs:
  build:
    name: Build and Deploy Release Asset
    runs-on: ubuntu-latest

    # Required permissions for creating and updating GitHub Releases
    permissions:
      contents: write

    steps:
      # Step 1: Clone the repository onto the virtual runner
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for accurate tag comparison
          fetch-tags: true

      # Step 2: Configure Java Environment
      # Sets up JDK 21 with Temurin and configures server-id for
      # potential publication to Maven-style repositories.
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      # Step 3: Initialize Gradle
      # Automates Gradle environment setup, including dependency caching
      # and build-scan integration.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # Step 4: Extract the exact version string first via your Gradle task
      - name: Get Version from Gradle Task
        id: gradle_version
        run: |
          VERSION=$(./gradlew -q :app:printAppVersion)
          printf "version=%s\n" "$VERSION" >> "$GITHUB_OUTPUT"

      # Step 5: Get the latest existing tag from git history depending on release type
      - name: Get Last Git Tag
        id: get_last_tag
        run: |
          ALL_TAGS=$(git tag --sort=-creatordate)
          CURRENT_HEAD_TAG=$(git tag --points-at HEAD)

          if [ "${{ github.event.inputs.release_type }}" = "prerelease" ]; then
            if [ -n "$CURRENT_HEAD_TAG" ]; then
              LAST_TAG=$(printf "%s\n" "$ALL_TAGS" | grep -v -x "$CURRENT_HEAD_TAG" | head -n 1)
            else
              LAST_TAG=$(printf "%s\n" "$ALL_TAGS" | head -n 1)
            fi
          else
            if [ -n "$CURRENT_HEAD_TAG" ]; then
              LAST_TAG=$(printf "%s\n" "$ALL_TAGS" | grep -v "-" | grep -v -x "$CURRENT_HEAD_TAG" | head -n 1)
            else
              LAST_TAG=$(printf "%s\n" "$ALL_TAGS" | grep -v "-" | head -n 1)
            fi
          fi

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          printf "last_tag=%s\n" "$LAST_TAG" >> "$GITHUB_OUTPUT"

      # Step 6: Automatically build the changelog from commits since the last tag
      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: "COMMIT"
          fromTag: ${{ steps.get_last_tag.outputs.last_tag }}
          toTag: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 7: Decode Android Keystore from GitHub Secrets
      - name: Decode Keystore
        run: |
          mkdir -p app/keystore
          printf '%s' "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/keystore/release.jks

      # Step 8: Compile Production Binary
      # Passes the extracted version string back into Gradle to freeze it
      - name: Build Release APK
        run: ./gradlew clean assembleRelease -PprojectVersion="${{ steps.gradle_version.outputs.version }}"
        env:
          ANDROID_KEYSTORE_PATH: "app/keystore/release.jks"
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Step 9: Publish Asset to GitHub Release
      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.gradle_version.outputs.version }}"
          target_commitish: ${{ github.sha }}
          body: |
            ### Changelog
            ${{ steps.build_changelog.outputs.changelog }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
