# ====================================================================
# GitHub Actions Workflow: Test Build APK
# Purpose: Validates code integrity by performing a clean debug build
#          on every push or pull request to primary branches.
# ====================================================================

name: Test Build APK

on:
  # Trigger on pushes to production and development branches
  push:
    branches: [ master, main ]
    paths-ignore:
      - '.github/**' # Ignore all changes inside the .github folder (workflows, templates)
      - '*.md'       # Ignore root-level markdown documentation
      - '.*'         # Ignore ALL top-level hidden configuration files (.gitignore, .editorconfig, etc.)

  # Trigger on pull requests targeting production and development branches
  pull_request:
    branches: [ master, main ]
    paths-ignore:
      - '.github/**' # Ignore all changes inside the .github folder (workflows, templates)
      - '*.md'       # Ignore root-level markdown documentation
      - '.*'         # Ignore ALL top-level hidden configuration files (.gitignore, .editorconfig, etc.)

  # Allow manual execution via the GitHub Actions UI
  workflow_dispatch:

jobs:
  build:
    name: Build and Package Debug APK
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone the repository onto the runner
      - name: Checkout code
        uses: actions/checkout@v7

      # Step 2: Configure the Java Runtime Environment (JRE)
      # Uses Temurin distribution (OpenJDK) and enables Gradle caching
      # to significantly reduce subsequent build times.
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # Step 3: Provision the necessary Android SDK components
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      # Step 4: Ensure the Gradle wrapper has execution permissions
      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # Step 5: Extract the exact version string first via your Gradle task
      - name: Get Version from Gradle Task
        id: gradle_version
        run: |
          VERSION=$(./gradlew -q :app:printAppVersion)
          printf "version=%s\n" "$VERSION" >> "$GITHUB_OUTPUT"

      # Step 6: Execute a clean build and assemble the Debug APK
      # Passes the extracted version string into Gradle to freeze it
      - name: Build Debug APK
        run: |
          ./gradlew clean assembleDebug \
            --warning-mode all \
            -PprojectVersion="${{ steps.gradle_version.outputs.version }}"

      # Step 7: Persist the generated APK as a workflow artifact
      # Artifacts are stored for 7 days to conserve storage while allowing review.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      # Step 8: Export Gradle Problem Reports
      # This step runs even if the build fails ('always()') to aid in debugging.
      - name: Upload Problems Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-problems-report
          path: build/reports/problems/
          retention-days: 7
