# PiPup Detekt Configuration
# Custom rules for code quality

build:
  maxIssues: 0
  excludeCorrectable: false
  weights:
    # Set weights to 0 if you don't want them to count towards maxIssues
    # but still want them reported as warnings.

comments:
  active: true
  UndocumentedPublicClass:
    active: true
    searchInNestedClass: true
    searchInInnerClass: true
  UndocumentedPublicFunction:
    active: true
  OutdatedDocumentation:
    active: true

complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 6

naming:
  active: true
  FunctionNaming:
    active: true
    functionPattern: '^[a-z][a-zA-Z0-9]*$'
  VariableNaming:
    active: true
    variablePattern: '^[a-z][a-zA-Z0-9]*$'
  ClassNaming:
    active: true
    classPattern: '^[A-Z][a-zA-Z0-9]*$'

style:
  active: true
  MaxLineLength:
    active: true
    maxLineLength: 120
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2']
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreLocalVariableDeclaration: true
    ignoreConstantDeclaration: true
