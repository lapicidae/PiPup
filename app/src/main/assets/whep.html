<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PiPup WHEP Player</title>
    <style>
        body, video { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: transparent; }
        video { object-fit: cover; display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline muted></video>
    <script>
        const video = document.getElementById('v');
        const stream = new MediaStream();
        video.srcObject = stream;

        async function start() {
            const urlParams = new URLSearchParams(window.location.search);
            const streamUrl = urlParams.get('url');
            if (!streamUrl) return;

            console.log('WHEP: Starting connection to ' + streamUrl);
            const startTime = Date.now();

            try {
                const hostname = new URL(streamUrl).hostname;
                const isLocal = /^(192\.168\.|10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|127\.|localhost|10\.0\.2\.2)/.test(hostname) || hostname.endsWith('.local');
                const config = {
                    iceServers: isLocal ? [] : [{ urls: 'stun:stun.l.google.com:19302' }],
                    iceTransportPolicy: 'all',
                    bundlePolicy: 'max-bundle'
                };

                const pc = new RTCPeerConnection(config);

                video.onplaying = () => {
                    const elapsed = Date.now() - startTime;
                    console.log('WHEP: Video playing after ' + elapsed + 'ms');
                    if (window.PiPup) window.PiPup.onMediaPlaying();
                };

                pc.ontrack = (e) => {
                    console.log('WHEP: Received remote track: ' + e.track.kind);
                    if (e.track.kind === 'video') {
                        stream.addTrack(e.track);
                        video.play().catch(err => console.error('WHEP: Play failed', err));
                    }
                };

                pc.addTransceiver('video', { direction: 'recvonly' });

                console.log('WHEP: Creating offer...');
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                console.log('WHEP: Fetching SDP answer...');
                const response = await fetch(streamUrl, {
                    method: 'POST',
                    body: offer.sdp,
                    headers: { 'Content-Type': 'application/sdp' }
                });

                if (!response.ok) {
                    throw new Error('HTTP error ' + response.status);
                }

                const answerSdpRaw = await response.text();
                // Strip a=end-of-candidates as it causes parsing errors in some WebView versions
                const answerSdp = answerSdpRaw.replace(/a=end-of-candidates\s?\r?\n/g, "");

                console.log('WHEP: Received answer (length: ' + answerSdp.length + ')');
                console.log('WHEP: Setting remote description...');
                await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
                console.log('WHEP: Setup complete, waiting for tracks...');
            } catch (e) {
                console.error('WHEP Error:', e);
                if (window.PiPup) window.PiPup.onMediaError(e.message);
            }
        }

        start();
    </script>
</body>
</html>
