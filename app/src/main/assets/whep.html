<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PiPup WHEP Player</title>
    <style>
        body, video { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: transparent; }
        video { object-fit: cover; display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline muted></video>
    <script>
        const video = document.getElementById('v');
        const stream = new MediaStream();
        video.srcObject = stream;

        async function start() {
            const urlParams = new URLSearchParams(window.location.search);
            const streamUrl = urlParams.get('url');
            if (!streamUrl) return;

            try {
                // Optimize: Disable STUN for local network URLs to avoid timeouts
                const isLocal = /^(192\.168\.|10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|127\.|localhost|10\.0\.2\.2)/.test(new URL(streamUrl).hostname);
                const config = {
                    iceServers: isLocal ? [] : [{ urls: 'stun:stun.l.google.com:19302' }],
                    iceTransportPolicy: 'all',
                    bundlePolicy: 'max-bundle'
                };

                const pc = new RTCPeerConnection(config);

                pc.ontrack = (e) => {
                    if (e.track.kind === 'video') {
                        stream.addTrack(e.track);
                        video.play().catch(() => {});
                    }
                };

                // Video only for faster connection and less overhead
                pc.addTransceiver('video', { direction: 'recvonly' });

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                const response = await fetch(streamUrl, {
                    method: 'POST',
                    body: offer.sdp,
                    headers: { 'Content-Type': 'application/sdp' }
                });

                if (!response.ok) return;

                const answerSdp = await response.text();
                await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
            } catch (e) {
                console.error('WHEP Error:', e);
            }
        }

        start();
    </script>
</body>
</html>
